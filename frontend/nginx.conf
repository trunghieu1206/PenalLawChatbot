server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    gzip on;
    gzip_types text/plain application/javascript application/json text/css;

    # BUG-FIX: Allow large request bodies for long legal case documents.
    # Without this, nginx rejects submissions >1MB with HTTP 413.
    client_max_body_size 50M;

    # Serve React SPA — always return index.html for unknown routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* to Spring Boot backend
    # CPU inference can take up to 10 min — timeouts must exceed 660s client timeout
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 720s;
        proxy_read_timeout 720s;
    }

    # Proxy /ai-api/* directly to FastAPI AI service (no auth needed)
    location /ai-api/ {
        proxy_pass http://ai-service:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 720s;
        proxy_read_timeout 720s;
    }
}
