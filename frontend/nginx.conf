server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    gzip on;
    gzip_types text/plain application/javascript application/json text/css;

    # Serve React SPA — always return index.html for unknown routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* to Spring Boot backend
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 130s;
        proxy_send_timeout 130s;
        proxy_read_timeout 130s;
    }

    # Proxy /ai-api/* directly to FastAPI AI service (no auth needed)
    location /ai-api/ {
        proxy_pass http://ai-service:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 130s;
        proxy_send_timeout 130s;
        proxy_read_timeout 130s;
    }
}
