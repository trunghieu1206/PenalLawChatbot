spring:
  application:
    name: penal-law-backend

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:penallaw}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        # Store all timestamps in UTC, normalize timezone
        jdbc:
          time_zone: UTC
        use_jdbc_metadata_defaults: false

  jackson:
    default-time-zone: UTC
    time-zone: Asia/Ho_Chi_Minh
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}

# JWT Config
jwt:
  secret: ${JWT_SECRET:change-this-secret-in-production-at-least-256-bits}
  expiration-ms: 86400000  # 24 hours

# AI Service
ai-service:
  base-url: ${AI_SERVICE_URL:http://localhost:8000}
  timeout-seconds: 120

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    com.penallaw: DEBUG
    org.springframework.security: WARN
