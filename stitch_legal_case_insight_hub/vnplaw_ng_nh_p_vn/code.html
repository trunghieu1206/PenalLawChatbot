<label class="font-label-sm text-label-sm text-primary" for="email">Email / Tên đăng nhập</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline-variant" style="font-variation-settings: 'FILL' 0;">person</span>
<input class="w-full pl-lg pr-sm py-sm bg-surface border border-outline-variant rounded-DEFAULT font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 transition-all" id="email" name="email" placeholder="Nhập thông tin của bạn" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-primary" for="password">Mật khẩu</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline-variant" style="font-variation-settings: 'FILL' 0;">lock</span>

</div>
</div>

<label class="flex items-center gap-xs cursor-pointer">
<input class="w-4 h-4 rounded border-outline-variant text-primary-container focus:ring-primary-container bg-surface" type="checkbox"/>
<span class="font-body-md text-body-md text-on-surface-variant text-sm">Ghi nhớ tôi</span>
</label>
<a class="font-body-md text-body-md text-sm text-surface-tint hover:text-primary transition-colors" href="#">Quên mật khẩu?</a>
</div>
<!-- Actions -->
<div class="flex flex-col gap-sm mt-sm">
<button class="w-full bg-primary-container text-on-primary py-sm rounded-DEFAULT font-label-sm text-label-sm hover:bg-tertiary transition-colors flex items-center justify-center gap-xs" type="submit">
